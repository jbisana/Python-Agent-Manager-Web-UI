<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src 'self' 'unsafe-inline';
                 connect-src 'self';
                 style-src 'self' 'unsafe-inline';
                 object-src 'none';
                 base-uri 'self';
                 frame-ancestors 'none';" />
  <meta name="csrf-token" content="" />
  <title>Python Script Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f4;
      color: #1c1c1a;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e5e5e3;
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header h1 { font-size: 15px; font-weight: 500; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #d1d1cf; }
    .dot.live { background: #3a9e6e; animation: blink .9s ease-in-out infinite; }
    #poll-status { font-size: 12px; color: #888; margin-left: auto; }

    .controls {
      background: #fff; border-bottom: 1px solid #e5e5e3;
      padding: 10px 24px; display: flex; align-items: center; gap: 12px;
      flex-wrap: wrap;
    }
    .search-input {
      font-size: 13px; padding: 6px 12px; border: 1px solid #d1d1cf;
      border-radius: 6px; width: 220px;
    }
    .filter-select {
      font-size: 13px; padding: 6px 10px; border: 1px solid #d1d1cf;
      border-radius: 6px; background: #fff;
    }
    .group-btn {
      font-size: 12px; color: #666; background: none; border: none;
      cursor: pointer; padding: 4px 8px; border-radius: 4px;
    }
    .group-btn.active { background: #ebebea; color: #1c1c1a; }

    .board {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
      padding: 20px;
      align-items: start;
    }
    @media (max-width: 600px) {
      .board { grid-template-columns: 1fr; padding: 12px; }
    }

    .col { display: flex; flex-direction: column; gap: 8px; }
    .col-header {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 500;
      color: #888; text-transform: uppercase; letter-spacing: .07em;
      padding: 0 2px 4px;
    }
    .col-count {
      background: #ebebea; color: #666;
      font-size: 10px; font-weight: 500;
      border-radius: 10px; padding: 1px 6px;
    }
    .col-body { display: flex; flex-direction: column; gap: 8px; min-height: 60px; }
    .empty-hint {
      font-size: 11px; color: #bbb;
      border: 1px dashed #e0e0de; border-radius: 8px;
      padding: 14px 10px; text-align: center;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e5e3;
      border-radius: 10px;
      padding: 13px 14px;
      transition: border-color .2s;
    }
    .card.running { border-color: #93c5fd; }
    .card.done    { border-color: #86efac; }
    .card.error   { border-color: #fca5a5; }

    .card-title { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
    .card-sub   { font-size: 11px; color: #888; margin-bottom: 9px; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
    .card-actions { display: flex; align-items: center; gap: 6px; }

    .badge {
      font-size: 10px; font-weight: 500;
      padding: 2px 8px; border-radius: 4px; display: inline-block;
    }
    .badge.idle    { background: #f0f0ee; color: #888; }
    .badge.running { background: #dbeafe; color: #1d4ed8; }
    .badge.done    { background: #dcfce7; color: #166534; }
    .badge.error   { background: #fee2e2; color: #991b1b; }

    .run-btn {
      font-size: 11px; padding: 3px 10px;
      border: 1px solid #d1d1cf; border-radius: 6px;
      background: transparent; color: #333; cursor: pointer;
    }
    .run-btn:hover { background: #f5f5f4; }
    .run-btn:disabled { opacity: .4; cursor: not-allowed; }

    .hist-btn {
      font-size: 10px; padding: 3px 8px;
      border: 1px solid #d1d1cf; border-radius: 6px;
      background: transparent; color: #666; cursor: pointer;
    }
    .hist-btn:hover { background: #f5f5f4; }

    .timer { font-size: 10px; color: #888; font-variant-numeric: tabular-nums; }

    .log-wrap {
      margin-top: 10px; border-radius: 6px;
      overflow: hidden; border: 1px solid #e5e5e3;
    }
    .log-header {
      background: #f5f5f4; font-size: 10px; color: #888;
      padding: 4px 10px; display: flex; align-items: center; gap: 5px;
    }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #d1d1cf; display: inline-block;
    }
    .live-dot.on { background: #3a9e6e; animation: blink .9s ease-in-out infinite; }

    .log-body {
      background: #16181c; color: #c9d1d9;
      font-family: ui-monospace, monospace; font-size: 11px;
      padding: 8px 10px; max-height: 140px;
      overflow-y: auto; white-space: pre-wrap; line-height: 1.55;
    }
    .log-ok   { color: #3fb950; }
    .log-warn { color: #d29922; }
    .log-err  { color: #f85149; }
    .log-info { color: #79c0ff; }
    .log-dim  { color: #6e7681; }

    /* ── History Drawer ─────────────────────────────────────── */
    .drawer-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.35);
      z-index: 100;
    }
    .drawer-overlay.open { display: flex; align-items: flex-end; }

    .drawer {
      background: #fff;
      border-radius: 12px 12px 0 0;
      width: 100%; max-height: 75vh;
      display: flex; flex-direction: column;
      box-shadow: 0 -4px 24px rgba(0,0,0,.12);
      animation: slide-up .22s ease;
    }
    @keyframes slide-up {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .drawer-head {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 18px 10px;
      border-bottom: 1px solid #e5e5e3;
      flex-shrink: 0;
    }
    .drawer-title { font-size: 14px; font-weight: 500; flex: 1; }
    .drawer-close {
      background: none; border: none; font-size: 18px;
      color: #888; cursor: pointer; line-height: 1;
    }
    .drawer-close:hover { color: #333; }

    .drawer-body { overflow-y: auto; padding: 12px 18px 18px; flex: 1; }

    .run-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid #f0f0ee;
      font-size: 12px;
    }
    .run-row:last-child { border-bottom: none; }
    .run-ts   { color: #888; font-size: 11px; min-width: 120px; }
    .run-el   { color: #888; font-size: 11px; min-width: 50px; }
    .run-log-btn {
      margin-left: auto; font-size: 10px; padding: 2px 8px;
      border: 1px solid #d1d1cf; border-radius: 5px;
      background: transparent; color: #555; cursor: pointer;
    }
    .run-log-btn:hover { background: #f5f5f4; }

    .drawer-log-viewer {
      margin-top: 12px; border-radius: 6px;
      overflow: hidden; border: 1px solid #e5e5e3;
    }
    .drawer-log-header {
      background: #f5f5f4; font-size: 10px; color: #888;
      padding: 4px 10px;
    }
    .drawer-log-body {
      background: #16181c; color: #c9d1d9;
      font-family: ui-monospace, monospace; font-size: 11px;
      padding: 8px 10px; max-height: 300px;
      overflow-y: auto; white-space: pre-wrap; line-height: 1.55;
    }

    .no-runs { font-size: 12px; color: #aaa; text-align: center; padding: 20px; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .entering { animation: slide-in .2s ease forwards; }

    /* Stats & Info styles */
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .info-card { background: #f9f9f8; border-radius: 8px; padding: 12px; }
    .info-label { font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 4px; }
    .info-val { font-size: 13px; font-weight: 500; word-break: break-all; }
    .stat-row { display: flex; justify-content: space-between; font-size: 12px; padding: 4px 0; }
    .stat-label { color: #666; }
    .stat-val { font-weight: 500; }
    .section-title { font-size: 11px; font-weight: 600; color: #444; margin: 20px 0 8px; text-transform: uppercase; }
  </style>
</head>
<body>

<header>
  <span class="dot live" id="poll-dot"></span>
  <h1>Python Script Manager</h1>
  <span id="poll-status">Connecting…</span>
</header>

<div class="controls">
  <input type="text" id="search-box" class="search-input" placeholder="Search scripts…">
  <select id="category-filter" class="filter-select">
    <option value="all">All Categories</option>
  </select>
  <button id="group-toggle" class="group-btn">Group by Category</button>
</div>

<div class="board" id="main-board">
  <div class="col" data-status="idle">
    <div class="col-header">Idle <span class="col-count" id="cnt-idle">0</span></div>
    <div class="col-body" id="col-idle"></div>
  </div>
  <div class="col" data-status="running">
    <div class="col-header">Running <span class="col-count" id="cnt-running">0</span></div>
    <div class="col-body" id="col-running">
      <div class="empty-hint" id="empty-running">Scripts appear here when started</div>
    </div>
  </div>
  <div class="col" data-status="done">
    <div class="col-header">Done <span class="col-count" id="cnt-done">0</span></div>
    <div class="col-body" id="col-done"></div>
  </div>
  <div class="col" data-status="error">
    <div class="col-header">Error <span class="col-count" id="cnt-error">0</span></div>
    <div class="col-body" id="col-error"></div>
  </div>
</div>

<div id="grouped-view" style="display: none; padding: 0 20px 20px;"></div>

<!-- History Drawer -->
<div class="drawer-overlay" id="drawer-overlay">
  <div class="drawer">
    <div class="drawer-head">
      <span class="drawer-title" id="drawer-title">Script Details</span>
      <button class="drawer-close" id="drawer-close-btn">✕</button>
    </div>
    <div class="drawer-body" id="drawer-body"></div>
  </div>
</div>

<script>
'use strict';

// ── CSRF ───────────────────────────────────────────────────────────────────────
(function storeCsrfToken() {
  const meta = document.querySelector('meta[name="csrf-token"]');
  const fromHeader = document.head.dataset.csrfToken || '';
  if (fromHeader) {
    meta.content = fromHeader;
  } else {
    fetch('/api/csrf-token')
      .then(r => r.json())
      .then(d => { meta.content = d.token || ''; })
      .catch(() => {});
  }
})();

function getCsrfToken() {
  return document.querySelector('meta[name="csrf-token"]').content;
}

// ── ID / status allowlists ─────────────────────────────────────────────────────
const allowedIds = new Set();
function isSafeId(id) { return typeof id === 'string' && allowedIds.has(id); }

const VALID_STATUSES = new Set(['idle', 'running', 'done', 'error']);
function safeStatus(s) { return VALID_STATUSES.has(s) ? s : 'idle'; }

// ── State ──────────────────────────────────────────────────────────────────────
const localState     = {};
const activeStreams   = {};
const timerIntervals = {};
let currentSearch = '';
let currentCategory = 'all';
let isGrouped = false;

// ── Log helpers ────────────────────────────────────────────────────────────────
function classifyLine(text) {
  const t = text.toLowerCase();
  if (t.includes('[error]') || t.includes('[fatal]')) return 'log-err';
  if (t.includes('[warn]'))                            return 'log-warn';
  if (t.includes('[ok]') || t.includes('[success]'))  return 'log-ok';
  if (t.includes('[info]'))                            return 'log-info';
  if (t.includes('[debug]'))                           return 'log-dim';
  return '';
}

function appendLog(id, text) {
  const out = document.getElementById('out-' + id);
  if (!out) return;
  const span = document.createElement('span');
  span.className = classifyLine(text);
  span.textContent = text;
  out.appendChild(span);
  out.appendChild(document.createTextNode('\n'));
  out.scrollTop = out.scrollHeight;
  if (!localState[id].log_lines) localState[id].log_lines = [];
  localState[id].log_lines.push(text);
}

function renderLines(container, lines) {
  lines.forEach(line => {
    const span = document.createElement('span');
    span.className = classifyLine(line);
    span.textContent = line;
    container.appendChild(span);
    container.appendChild(document.createTextNode('\n'));
  });
}

// ── Timers ─────────────────────────────────────────────────────────────────────
function startTimer(id) {
  let secs = 0;
  timerIntervals[id] = setInterval(() => {
    secs++;
    const el = document.getElementById('timer-' + id);
    if (el) el.textContent = Math.floor(secs / 60) + ':' + String(secs % 60).padStart(2, '0');
  }, 1000);
}
function stopTimer(id) { clearInterval(timerIntervals[id]); delete timerIntervals[id]; }

// ── Card builder ───────────────────────────────────────────────────────────────
function buildCard(script, animate) {
  const id   = script.id;
  const st   = safeStatus(script.status);
  const logs = (localState[id] && localState[id].log_lines) || [];

  const card = document.createElement('div');
  card.id        = 'card-' + id;
  card.className = 'card ' + st + (animate ? ' entering' : '');

  const titleEl = document.createElement('div');
  titleEl.className   = 'card-title';
  titleEl.textContent = script.name;

  const subEl = document.createElement('div');
  subEl.className   = 'card-sub';
  subEl.textContent = script.description;

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const badge = document.createElement('span');
  badge.className   = 'badge ' + st;
  badge.textContent = st[0].toUpperCase() + st.slice(1);
  footer.appendChild(badge);

  const actions = document.createElement('div');
  actions.className = 'card-actions';

  if (st === 'idle' || st === 'error' || st === 'done') {
    const btn = document.createElement('button');
    btn.className   = 'run-btn';
    btn.textContent = st === 'error' ? '↺ Retry' : (st === 'done' ? '↺ Re-run' : '▶ Run');
    btn.dataset.scriptId = id;
    btn.addEventListener('click', handleRunClick);
    actions.appendChild(btn);
  }

  if (st === 'running') {
    const timer = document.createElement('span');
    timer.className   = 'timer';
    timer.id          = 'timer-' + id;
    timer.textContent = '0:00';
    actions.appendChild(timer);
  } else if (st === 'done' || st === 'error') {
    const timer = document.createElement('span');
    timer.className   = 'timer';
    timer.textContent = script.elapsed || '';
    actions.appendChild(timer);
  }

  // History button for any non-running card
  if (st !== 'running') {
    const hBtn = document.createElement('button');
    hBtn.className   = 'hist-btn';
    hBtn.textContent = '📋 History';
    hBtn.dataset.scriptId = id;
    hBtn.dataset.scriptName = script.name;
    hBtn.addEventListener('click', handleHistoryClick);
    actions.appendChild(hBtn);
  }

  footer.appendChild(actions);
  card.append(titleEl, subEl, footer);

  if (st === 'running') {
    card.appendChild(buildLiveLogPanel(id));
  } else if (st === 'done' || st === 'error') {
    card.appendChild(buildFinishedLogPanel(logs));
  }

  return card;
}

function buildLiveLogPanel(id) {
  const wrap   = document.createElement('div');  wrap.className = 'log-wrap';
  const header = document.createElement('div');  header.className = 'log-header';
  const dot    = document.createElement('span'); dot.className = 'live-dot on';
  header.appendChild(dot);
  header.appendChild(document.createTextNode(' stdout · live'));
  const body = document.createElement('div');
  body.className = 'log-body';
  body.id = 'out-' + id;
  wrap.append(header, body);
  return wrap;
}

function buildFinishedLogPanel(logs) {
  const wrap   = document.createElement('div');  wrap.className = 'log-wrap';
  const header = document.createElement('div');  header.className = 'log-header';
  const dot    = document.createElement('span'); dot.className = 'live-dot';
  header.appendChild(dot);
  header.appendChild(document.createTextNode(' stdout · finished'));
  const body = document.createElement('div');
  body.className = 'log-body';
  renderLines(body, logs);
  wrap.append(header, body);
  return wrap;
}

// ── Handlers ───────────────────────────────────────────────────────────────────
function handleRunClick(e) {
  const id = e.currentTarget.dataset.scriptId;
  if (!isSafeId(id)) return;
  triggerScript(id);
}

function handleHistoryClick(e) {
  const id   = e.currentTarget.dataset.scriptId;
  if (!isSafeId(id)) return;
  openDetailsDrawer(id);
}

// ── Column management ──────────────────────────────────────────────────────────
function placeCard(script, animate) {
  const id = script.id;
  const st = safeStatus(script.status);
  
  // Update localState if this is a fresh object from server
  if (script.name) {
    localState[id] = { ...localState[id], ...script };
  }

  const existing = document.getElementById('card-' + id);
  if (existing) existing.remove();

  // Apply filtering
  const matchesSearch = script.name.toLowerCase().includes(currentSearch.toLowerCase()) || 
                        script.description.toLowerCase().includes(currentSearch.toLowerCase());
  const matchesCat = currentCategory === 'all' || script.category === currentCategory;

  if (!matchesSearch || !matchesCat) {
    updateCounts();
    return;
  }

  if (isGrouped) {
    renderGrouped();
  } else {
    const col = document.getElementById('col-' + st);
    if (col) col.appendChild(buildCard(script, animate));
  }
  updateCounts();
}

function updateCounts() {
  ['idle', 'running', 'done', 'error'].forEach(st => {
    document.getElementById('cnt-' + st).textContent =
      document.querySelectorAll('#col-' + st + ' .card').length;
  });
  const hint = document.getElementById('empty-running');
  if (hint) hint.style.display =
    document.querySelectorAll('#col-running .card').length === 0 ? '' : 'none';
}

// ── SSE streaming ──────────────────────────────────────────────────────────────
function openLogStream(id) {
  if (!isSafeId(id)) return;
  if (activeStreams[id]) { activeStreams[id].close(); delete activeStreams[id]; }
  if (localState[id]) localState[id].logLines = [];

  const sse = new EventSource('/api/logs/' + encodeURIComponent(id));
  activeStreams[id] = sse;

  sse.onmessage = (event) => {
    let msg;
    try { msg = JSON.parse(event.data); } catch { return; }

    if (msg.type === 'log' && typeof msg.text === 'string') {
      appendLog(id, msg.text);
    } else if (msg.type === 'done') {
      stopTimer(id);
      sse.close();
      delete activeStreams[id];
      const st = safeStatus(msg.status);
      if (localState[id]) {
        localState[id].status  = st;
        localState[id].elapsed = typeof msg.elapsed === 'string' ? msg.elapsed : '';
      }
      placeCard({ ...localState[id], id }, true);
    }
  };
  sse.onerror = () => { sse.close(); delete activeStreams[id]; };
}

// ── Trigger ────────────────────────────────────────────────────────────────────
async function triggerScript(id) {
  if (!isSafeId(id)) return;
  const res = await fetch('/api/run/' + encodeURIComponent(id), {
    method: 'POST',
    headers: { 'X-CSRF-Token': getCsrfToken() },
  });
  if (!res.ok) return;
  localState[id].status  = 'running';
  localState[id].elapsed = null;
  placeCard({ ...localState[id], id }, true);
  startTimer(id);
  openLogStream(id);
}

// ── History Drawer ─────────────────────────────────────────────────────────────
const drawerOverlay = document.getElementById('drawer-overlay');
const drawerBody    = document.getElementById('drawer-body');
const drawerTitle   = document.getElementById('drawer-title');
document.getElementById('drawer-close-btn').addEventListener('click', closeDrawer);
drawerOverlay.addEventListener('click', (e) => { if (e.target === drawerOverlay) closeDrawer(); });

function closeDrawer() { drawerOverlay.classList.remove('open'); }

async function openDetailsDrawer(id) {
  const script = localState[id];
  drawerTitle.textContent = script.name;
  drawerBody.innerHTML = '<div class="no-runs">Loading details…</div>';
  drawerOverlay.classList.add('open');

  let history = [];
  let stats = { total_runs: 0, avg_duration: 0, max_duration: 0, error_count: 0 };

  try {
    const [hRes, sRes] = await Promise.all([
      fetch('/api/history/' + encodeURIComponent(id)),
      fetch('/api/stats/' + encodeURIComponent(id))
    ]);
    history = await hRes.json();
    stats = await sRes.json();
  } catch (e) {
    console.error("Failed to fetch details", e);
  }

  drawerBody.innerHTML = `
    <div class="detail-grid">
      <div class="info-card">
        <div class="info-label">Description</div>
        <div class="info-val">${script.description}</div>
      </div>
      <div class="info-card">
        <div class="info-label">Usage Stats</div>
        <div class="stat-row"><span class="stat-label">Total Runs:</span> <span class="stat-val">${stats.total_runs}</span></div>
        <div class="stat-row"><span class="stat-label">Avg Duration:</span> <span class="stat-val">${stats.avg_duration}s</span></div>
        <div class="stat-row"><span class="stat-label">Error Rate:</span> <span class="stat-val">${stats.total_runs ? Math.round((stats.error_count / stats.total_runs) * 100) : 0}%</span></div>
      </div>
    </div>

    <div class="detail-grid">
      <div class="info-card">
        <div class="info-label">Configuration</div>
        <div class="stat-row"><span class="stat-label">Category:</span> <span class="stat-val">${script.category}</span></div>
        <div class="stat-row"><span class="stat-label">Timeout:</span> <span class="stat-val">${script.timeout}s</span></div>
        <div class="stat-row"><span class="stat-label">Schedule:</span> <span class="stat-val">${script.schedule || 'None'} ${script.schedule_disabled ? '(Disabled)' : ''}</span></div>
      </div>
      <div class="info-card">
        <div class="info-label">Advanced</div>
        <div class="stat-row"><span class="stat-label">Arguments:</span> <span class="stat-val">${script.args.length ? script.args.join(' ') : 'None'}</span></div>
        <div class="stat-row"><span class="stat-label">Env Vars:</span> <span class="stat-val">${Object.keys(script.env).length || 'None'}</span></div>
      </div>
    </div>

    <div class="section-title">Run History (Last 20)</div>
    <div id="history-list"></div>
    <div id="log-viewer-container"></div>
  `;

  const historyList = document.getElementById('history-list');
  const logViewer = document.getElementById('log-viewer-container');

  if (!history.length) {
    historyList.innerHTML = '<div class="no-runs">No run history found.</div>';
  } else {
    history.forEach(run => {
      const row = document.createElement('div');
      row.className = 'run-row';
      row.innerHTML = `
        <span class="run-ts">${new Date(run.started_at * 1000).toLocaleString()}</span>
        <span class="badge ${safeStatus(run.status)}">${run.status.toUpperCase()}</span>
        <span class="run-el">${run.elapsed || '—'}</span>
        <button class="run-log-btn">📄 Log</button>
      `;
      row.querySelector('button').onclick = () => loadRunLog(id, run.run_id, logViewer);
      historyList.appendChild(row);
    });
  }
}

async function loadRunLog(key, runId, container) {
  container.textContent = '';

  const viewer = document.createElement('div');
  viewer.className = 'drawer-log-viewer';

  const hdr = document.createElement('div');
  hdr.className   = 'drawer-log-header';
  hdr.textContent = 'Log · ' + runId.slice(0, 8) + '…';

  const body = document.createElement('div');
  body.className = 'drawer-log-body';

  viewer.append(hdr, body);
  container.appendChild(viewer);

  try {
    const res = await fetch('/api/logs/' + encodeURIComponent(key) + '/' + encodeURIComponent(runId));
    const data = await res.json();
    if (Array.isArray(data.lines) && data.lines.length > 0) {
      renderLines(body, data.lines);
    } else {
      body.textContent = '(no log output)';
    }
  } catch {
    body.textContent = 'Failed to load log.';
  }
}

// ── Status polling ─────────────────────────────────────────────────────────────
async function pollStatus() {
  try {
    const res = await fetch('/api/scripts');
    if (!res.ok) throw new Error('non-200');

    const newToken = res.headers.get('X-CSRF-Token');
    if (newToken) document.querySelector('meta[name="csrf-token"]').content = newToken;

    const scripts = await res.json();
    const safeKeyRe = /^[a-zA-Z0-9_]{1,64}$/;

    for (const [rawId, script] of Object.entries(scripts)) {
      if (!safeKeyRe.test(rawId)) continue;
      allowedIds.add(rawId);

      const st   = safeStatus(script.status);
      const prev = localState[rawId];

      // Merge server-sent logLines into local state on first load (restart recovery)
      if (!prev) {
        localState[rawId] = {
          ...script,
          status:   st,
          log_lines: Array.isArray(script.log_lines) ? script.log_lines : [],
        };
        placeCard({ ...localState[rawId], id: rawId }, false);
        if (st === 'running' && !activeStreams[rawId]) {
          startTimer(rawId);
          openLogStream(rawId);
        }
        continue;
      }

      if (prev.status !== st) {
        if (activeStreams[rawId] && st === 'running') {
          localState[rawId] = { ...script, status: st };
          continue;
        }
        localState[rawId] = {
          ...script,
          status:   st,
          log_lines: (prev && prev.log_lines) || [],
        };
        placeCard({ ...localState[rawId], id: rawId }, true);
        if (st === 'running' && !activeStreams[rawId]) {
          startTimer(rawId);
          openLogStream(rawId);
        }
      }
    }

    document.getElementById('poll-status').textContent =
      'Last updated ' + new Date().toLocaleTimeString();
    document.getElementById('poll-dot').classList.add('live');

  } catch {
    document.getElementById('poll-status').textContent = 'Server unreachable';
    document.getElementById('poll-dot').classList.remove('live');
  }
}

// ── Filter/Group logic ────────────────────────────────────────────────────────
function applyFilters() {
  document.querySelectorAll('.col-body').forEach(b => b.innerHTML = '');
  if (isGrouped) {
    renderGrouped();
  } else {
    Object.keys(localState).forEach(id => placeCard({ ...localState[id], id }, false));
  }
}

function renderGrouped() {
  const container = document.getElementById('grouped-view');
  container.innerHTML = '';
  const groups = {};
  
  Object.keys(localState).forEach(id => {
    const s = localState[id];
    const matchesSearch = s.name.toLowerCase().includes(currentSearch.toLowerCase()) || 
                          s.description.toLowerCase().includes(currentSearch.toLowerCase());
    const matchesCat = currentCategory === 'all' || s.category === currentCategory;
    
    if (matchesSearch && matchesCat) {
      if (!groups[s.category]) groups[s.category] = [];
      groups[s.category].push({ ...s, id });
    }
  });

  Object.keys(groups).sort().forEach(cat => {
    const sec = document.createElement('div');
    sec.innerHTML = `<div class="section-title">${cat}</div><div class="board" style="padding:0"></div>`;
    const grid = sec.querySelector('.board');
    groups[cat].forEach(s => grid.appendChild(buildCard(s, false)));
    container.appendChild(sec);
  });
}

document.getElementById('search-box').oninput = (e) => {
  currentSearch = e.target.value;
  applyFilters();
};

document.getElementById('category-filter').onchange = (e) => {
  currentCategory = e.target.value;
  applyFilters();
};

document.getElementById('group-toggle').onclick = (e) => {
  isGrouped = !isGrouped;
  e.target.classList.toggle('active', isGrouped);
  document.getElementById('main-board').style.display = isGrouped ? 'none' : 'grid';
  document.getElementById('grouped-view').style.display = isGrouped ? 'block' : 'none';
  applyFilters();
};

function updateCategoryOptions() {
  const cats = new Set(['all']);
  Object.values(localState).forEach(s => cats.add(s.category));
  const sel = document.getElementById('category-filter');
  const current = sel.value;
  sel.innerHTML = '';
  Array.from(cats).sort().forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c === 'all' ? 'All Categories' : c.charAt(0).toUpperCase() + c.slice(1);
    sel.appendChild(opt);
  });
  sel.value = cats.has(current) ? current : 'all';
}

// ── Boot ───────────────────────────────────────────────────────────────────────
pollStatus().then(() => {
  updateCategoryOptions();
  setInterval(pollStatus, 2000);
});
</script>
